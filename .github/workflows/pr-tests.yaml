name: Automatic Pull Request test

on:
  pull_request:
    branches:
      - "main"
      - "release*"

permissions:
  contents: read

jobs:
  unit-test:
    name: Unit test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout latest commit in the PR
        uses: actions/checkout@v3
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
      - name: Set up tools
        run: |
          go install golang.org/x/lint/golint@latest
          go install golang.org/x/tools/cmd/goimports@latest
      - name: Set up BPF and Linux Headers
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y libbpf-dev linux-tools-generic \
            linux-headers-$(uname -r) libelf-dev zlib1g-dev

          # linux-tools-generic ships a versioned bpftool (may be a symlink); resolve and put it in PATH
          BPFTOOL_BIN="$(find /usr/lib/linux-tools/ -name bpftool 2>/dev/null | head -1)"
          [ -n "${BPFTOOL_BIN}" ] && sudo ln -sf "$(realpath ${BPFTOOL_BIN})" /usr/local/bin/bpftool
          bpftool version
          test -r /sys/kernel/btf/vmlinux
      - name: Build
        run: make build-linux
      - name: Unit test
        run: sudo env PATH=$PATH make unit-test
      - name: Upload code coverage
        uses: codecov/codecov-action@v3
  functional-test:
    name: Functional test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout latest commit in the PR
        uses: actions/checkout@v3
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
      - name: Set up BPF and Linux Headers
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y libbpf-dev linux-tools-generic \
            linux-headers-$(uname -r) libelf-dev zlib1g-dev

          # linux-tools-generic ships a versioned bpftool (may be a symlink); resolve and put it in PATH
          BPFTOOL_BIN="$(find /usr/lib/linux-tools/ -name bpftool 2>/dev/null | head -1)"
          [ -n "${BPFTOOL_BIN}" ] && sudo ln -sf "$(realpath ${BPFTOOL_BIN})" /usr/local/bin/bpftool
          bpftool version
          test -r /sys/kernel/btf/vmlinux
      - name: Build
        run: make build-linux
      - name: Functional test
        run: cd test && sudo env PATH=$PATH make run-test
